name: Fuzz (nightly)

# Deeper fuzz pass than the per-PR smoke job in ci.yml. Runs every parser
# fuzz target for several minutes; uploads any artifacts cargo-fuzz emits
# (crash inputs, leaks) so a maintainer can triage them and commit the
# minimized samples into `crates/forge-parser/tests/fuzz_regressions/`.
#
# See docs/fuzzing.md.

on:
  schedule:
    # 06:00 UTC daily. Adjust if it collides with another scheduled job.
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [parse_str_bytes, parse_str_structured, transformer_output_ir]
    # cargo-fuzz ≥ 0.13 defaults to `x86_64-unknown-linux-musl`, which
    # would need `musl-g++` (libfuzzer-sys's build script compiles C++)
    # — Ubuntu only ships `musl-gcc`. Pin `--target` to gnu instead.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@3235f8901fd37ffed0052b276cec25a362fb82e9 # v2.77.7
        with:
          tool: cargo-fuzz
      - name: Seed corpus from in-tree fixtures
        if: matrix.target != 'parse_str_structured'
        run: bash fuzz/seed-corpus.sh ${{ matrix.target }}
      - name: Fuzz ${{ matrix.target }} (10 min)
        working-directory: fuzz
        run: cargo fuzz run --target x86_64-unknown-linux-gnu ${{ matrix.target }} -- -max_total_time=600
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/
            fuzz/corpus/${{ matrix.target }}/
          if-no-files-found: ignore
          retention-days: 14
