name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on PR branches; never on `main`. Pure runner-cost
# saving — wall time on a single PR is unaffected.
#
# Safe under branch protection: required-check evaluation happens on the
# latest commit SHA. A cancelled run lives on the previous SHA and doesn't
# affect the merge candidate.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: 1

# macOS and Linux only. No Windows. See plan §2.
jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # The reqwest acceptance test (`generated_petstore_crate_cargo_checks`)
      # writes a generated crate to a tempdir and runs `cargo check` on it.
      # By default that creates a fresh `target/` inside the tempdir, so
      # reqwest+tokio+serde compile from scratch every run. Redirect via this
      # env so the test code can pass `--target-dir` to a cacheable path.
      # Set in a step (not job-level env) because the `runner` context is
      # only available inside steps.
      - name: Set itest target dir
        run: echo "FORGE_ITEST_CARGO_TARGET_DIR=$HOME/.cache/forge-itest-target" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Cache itest cargo-check target dir
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/forge-itest-target
          key: forge-itest-target-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: forge-itest-target-${{ runner.os }}-
      - uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: nextest
      # No `#[test]` / `#[cfg(test)]` may live inside a plugin crate — see
      # ADR-0004. Catch any reintroduction before doing the slow build.
      - run: cargo xtask plugin-test-discipline
      # Plugin .wasm artifacts must exist before host integration tests run.
      - run: cargo build --release --target wasm32-wasip2 --manifest-path plugins/Cargo.toml
      - run: cargo nextest run --workspace

  doc:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo doc --workspace --no-deps

  wit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: wasm-tools
      - name: Resolve WIT package
        run: wasm-tools component wit ./wit

  # Quick fuzz smoke. Runs each parser fuzz target for ~1 minute on the
  # nightly toolchain (cargo-fuzz / libFuzzer require nightly). Catches
  # parser-panic regressions on PRs cheaply; deeper coverage runs nightly
  # via .github/workflows/fuzz.yml. See docs/fuzzing.md.
  fuzz-smoke:
    runs-on: ubuntu-latest
    # cargo-fuzz ≥ 0.13 defaults to `x86_64-unknown-linux-musl`, which
    # would need both `musl-gcc` and `musl-g++` (libfuzzer-sys's build
    # script compiles C++) — Ubuntu only ships the C half via the
    # `musl-tools` package. The gnu target works out-of-the-box for
    # libFuzzer + AddressSanitizer here, so pin `--target` explicitly
    # on every `cargo fuzz run` call below.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: fuzz
      - uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: cargo-fuzz
      - name: Seed corpus from in-tree fixtures
        run: bash fuzz/seed-corpus.sh
      - name: Fuzz parse_str_bytes (60s)
        working-directory: fuzz
        run: cargo fuzz run --target x86_64-unknown-linux-gnu parse_str_bytes -- -runs=10000 -max_total_time=60
      - name: Fuzz parse_str_structured (60s)
        working-directory: fuzz
        run: cargo fuzz run --target x86_64-unknown-linux-gnu parse_str_structured -- -runs=10000 -max_total_time=60
      - name: Fuzz transformer_output_ir (60s)
        working-directory: fuzz
        run: cargo fuzz run --target x86_64-unknown-linux-gnu transformer_output_ir -- -runs=10000 -max_total_time=60

  # MVP-gate smoke tests. For each fixture under `fixtures/real-world/`,
  # parse the spec and run it through both generators, then assert the
  # output compiles (`tsc --noEmit` for TS, `cargo check` for Rust).
  # Linux only — the property doesn't differ across OSes and the test is
  # heavyweight (pulls reqwest and friends through cargo check).
  real-world:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # See note in the `test` job — same `cargo check` per-tempdir pattern,
      # same redirect to a cached path so reqwest+tokio+serde build once.
      - name: Set itest target dir
        run: echo "FORGE_ITEST_CARGO_TARGET_DIR=$HOME/.cache/forge-itest-target" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Cache itest cargo-check target dir
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/forge-itest-target
          key: forge-itest-target-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: forge-itest-target-${{ runner.os }}-
      - uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: nextest
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - run: npm install -g typescript@5
      # Plugin .wasm artifacts must exist before the test loads them.
      - run: cargo build --release --target wasm32-wasip2 --manifest-path plugins/Cargo.toml
      - run: cargo nextest run -p forge-plugin-itests --features real-world --test real_world

  # Reference cross-language plugin (issue #58). Builds a Go server
  # generator via TinyGo + wit-bindgen-go, loads it through the same
  # `forge-host` runtime as Rust plugins, asserts `go build` accepts the
  # generated output. Linux only — TinyGo's wasip2 target is identical
  # across OSes and the job is heavyweight.
  plugin-go-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # `tinygo build -target=wasip2` shells out to `wasm-tools component
      # embed`, so it must be on PATH alongside cargo-nextest.
      - uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: cargo-nextest,wasm-tools
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.24"
      - name: Cache TinyGo install
        id: tinygo-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /usr/local/lib/tinygo
            /usr/local/bin/tinygo
          key: tinygo-0.40.1-${{ runner.os }}
      - name: Install TinyGo
        if: steps.tinygo-cache.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o /tmp/tinygo.deb \
            https://github.com/tinygo-org/tinygo/releases/download/v0.40.1/tinygo_0.40.1_amd64.deb
          sudo dpkg -i /tmp/tinygo.deb
      - name: Build Go plugin
        run: bash plugins/generator-go-server/build.sh
      - run: cargo nextest run -p forge-plugin-itests --features go-server --test generator_go_server

  # Reference cross-language plugin: TypeScript-source CLI generator
  # (issue #58). Builds via jco + componentize-js + esbuild + typescript;
  # acceptance subtests `npm install` + `tsc` + `node bin/...js --help` on
  # the generated output. Linux only — the toolchain is identical across
  # OSes and the job is heavyweight (~6 minutes).
  plugin-typescript-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: nextest
      # `cache: 'npm'` caches `~/.npm` (npm's tarball cache) keyed on the
      # plugin's lockfile. Subprocess `npm install` calls in the test (each
      # subtest installs the generated CLI's deps in a fresh tempdir) inherit
      # the same cacache directory, so they hit cached tarballs instead of
      # re-downloading on every run.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: plugins/generator-typescript-cli/package-lock.json
      - name: Build TS plugin
        run: bash plugins/generator-typescript-cli/build.sh
      - run: cargo nextest run -p forge-plugin-itests --features typescript-cli --test generator_typescript_cli

  # Prove the pipeline is deterministic. Two `forge generate` runs against
  # the same input must produce byte-identical outputs. Linux only — the
  # property doesn't differ across OSes and a matrix would just double cost.
  determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # Plugins must be built first so the bundled forge.toml in the
      # petstore fixture can resolve `..../generator_typescript_fetch.wasm`.
      - run: cargo build --release --target wasm32-wasip2 --manifest-path plugins/Cargo.toml
      - run: cargo build --release -p openapi-forge-cli
      - name: Generate twice and diff
        run: |
          rm -rf /tmp/forge-a /tmp/forge-b
          ./target/release/forge generate fixtures/e2e/petstore --out /tmp/forge-a
          ./target/release/forge generate fixtures/e2e/petstore --out /tmp/forge-b
          diff -r /tmp/forge-a /tmp/forge-b

  # Smoke-test the setup action on both supported platforms. Installs the
  # latest published release via `uses: ./` and verifies the binary runs.
  test-action:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./
      - run: forge --version
